name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve slug, tag, and version
        id: meta
        run: |
          SLUG="${GITHUB_REPOSITORY##*/}"
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches plugin header Version
        run: |
          MAIN="${{ steps.meta.outputs.slug }}.php"
          if [ ! -f "$MAIN" ]; then
            echo "::error::Main plugin file '$MAIN' not found at repo root."
            exit 1
          fi
          HEADER_VERSION=$(grep -E '^[[:space:]]*\*[[:space:]]*Version:' "$MAIN" | head -1 | sed -E 's/.*Version:[[:space:]]*//;s/[[:space:]]+$//')
          if [ "$HEADER_VERSION" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::Tag version (${{ steps.meta.outputs.version }}) does not match plugin header Version ($HEADER_VERSION). Bump the header in $MAIN before tagging."
            exit 1
          fi
          echo "Plugin header Version $HEADER_VERSION matches tag ${{ steps.meta.outputs.tag }}."

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Composer production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Stage plugin files
        run: |
          SLUG="${{ steps.meta.outputs.slug }}"
          mkdir -p "build/$SLUG"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.distignore' \
            --exclude='.gitleaks.toml' \
            --exclude='.claude' \
            --exclude='CLAUDE.md' \
            --exclude='README.md' \
            --exclude='Makefile' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='bin' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='build' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='eslint.config.js' \
            --exclude='phpcs.xml*' \
            --exclude='phpstan*' \
            --exclude='phpunit.xml*' \
            --exclude='.phpunit.result.cache' \
            --exclude='*-plan.md' \
            --exclude='.DS_Store' \
            ./ "build/$SLUG/"

      - name: Create zip
        id: zip
        run: |
          SLUG="${{ steps.meta.outputs.slug }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="$SLUG-$VERSION.zip"
          (cd build && zip -qr "../$ZIP" "$SLUG")
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from commit log
        id: notes
        run: |
          set -e
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          SLUG="${{ steps.meta.outputs.slug }}"
          MAIN="${SLUG}.php"
          NOTES_FILE="$(mktemp)"

          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -vx "$TAG" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            echo "Generating notes for ${RANGE}"
          else
            RANGE="$TAG"
            echo "First release — using full commit history"
          fi

          DESCRIPTION=$(sed -nE '/\* Description:/ { s/.*Description:[[:space:]]*//; s/[[:space:]]+$//; p; q; }' "$MAIN" || true)
          REQ_WP=$(sed -nE '/\* Requires at least:/ { s/.*Requires at least:[[:space:]]*//; s/[[:space:]]+$//; p; q; }' "$MAIN" || true)
          REQ_PHP=$(sed -nE '/\* Requires PHP:/ { s/.*Requires PHP:[[:space:]]*//; s/[[:space:]]+$//; p; q; }' "$MAIN" || true)
          PLUGIN_NAME=$(sed -nE '/\* Plugin Name:/ { s/.*Plugin Name:[[:space:]]*//; s/[[:space:]]+$//; p; q; }' "$MAIN" || true)

          declare -a feat_lines fix_lines refactor_lines perf_lines other_lines
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in
              feat\(*\):*|feat:*)        feat_lines+=("${line#*: }") ;;
              fix\(*\):*|fix:*)          fix_lines+=("${line#*: }") ;;
              refactor\(*\):*|refactor:*) refactor_lines+=("${line#*: }") ;;
              perf\(*\):*|perf:*)        perf_lines+=("${line#*: }") ;;
              ci:*|ci\(*\):*|chore:*|chore\(*\):*|docs:*|docs\(*\):*|test:*|test\(*\):*|style:*|style\(*\):*|build:*|build\(*\):*|release:*) ;;
              *)                          other_lines+=("$line") ;;
            esac
          done < <(git log "$RANGE" --no-merges --pretty=tformat:'%s')

          emit() {
            local title="$1"; shift
            [ "$#" -eq 0 ] && return
            {
              echo "## $title"
              echo
              for l in "$@"; do
                [ -z "$l" ] && continue
                printf -- '- %s%s\n' "$(printf '%s' "${l:0:1}" | tr '[:lower:]' '[:upper:]')" "${l:1}"
              done
              echo
            } >> "$NOTES_FILE"
          }

          {
            if [ -z "$PREV_TAG" ]; then
              echo "First public release of ${PLUGIN_NAME:-$SLUG}."
              echo
              [ -n "$DESCRIPTION" ] && { echo "$DESCRIPTION"; echo; }
            fi
          } >> "$NOTES_FILE"

          [ "${#feat_lines[@]}" -gt 0 ] && emit "Added" "${feat_lines[@]}"
          [ "${#fix_lines[@]}" -gt 0 ] && emit "Fixed" "${fix_lines[@]}"
          [ "${#refactor_lines[@]}" -gt 0 ] && emit "Changed" "${refactor_lines[@]}"
          [ "${#perf_lines[@]}" -gt 0 ] && emit "Performance" "${perf_lines[@]}"
          [ "${#other_lines[@]}" -gt 0 ] && emit "Other" "${other_lines[@]}"
          true

          {
            echo "## Requirements"
            echo
            [ -n "$REQ_WP" ] && echo "- WordPress ${REQ_WP}+"
            [ -n "$REQ_PHP" ] && echo "- PHP ${REQ_PHP}+"
            echo
            echo "---"
            echo
            echo "**Download:** \`${SLUG}-${VERSION}.zip\` (attached below)."
          } >> "$NOTES_FILE"

          # Collapse any 3+ blank lines into 2.
          awk 'BEGIN{b=0} /^$/{b++; if(b<3) print; next} {b=0; print}' "$NOTES_FILE" > "${NOTES_FILE}.tidy"
          mv "${NOTES_FILE}.tidy" "$NOTES_FILE"

          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "::group::Release notes preview"
          cat "$NOTES_FILE"
          echo "::endgroup::"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            "${{ steps.zip.outputs.path }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.file }}"
